# Reference config — server-setup.sh writes this automatically.
# File installed to: /etc/nginx/sites-available/meshrace
# Symlinked to:      /etc/nginx/sites-enabled/meshrace
#
# If you already have a server block for this hostname, copy only the
# location block into that file and skip this server wrapper.

server {
    listen 80;
    listen [::]:80;
    server_name your.hostname.here;

    location /MeshraceSim/ {
        alias /srv/meshtastic-race-simulator/;
        index index.html;
        try_files $uri $uri/ /MeshraceSim/index.html;
        add_header Cache-Control "public, max-age=3600";
    }
}
