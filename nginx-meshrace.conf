# Drop this file in /etc/nginx/conf.d/ or include it in your server block.
# Serves the MeshRace Simulator at http://<host>/MeshraceSim/

location /MeshraceSim/ {
    alias /var/www/html/MeshraceSim/;
    index index.html;
    try_files $uri $uri/ /MeshraceSim/index.html;

    # Cache static assets aggressively; the single HTML file is versioned by deploy
    add_header Cache-Control "public, max-age=3600";
}
